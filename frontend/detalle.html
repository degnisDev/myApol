<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyApol - Detalle de Dispositivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Hoja de estilos principal -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Menú -->
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-apple"></i> MyApol
            </a>
            <div class="d-flex align-items-center">
                <!-- Zona Pública -->
                <div id="zona-usuario-detalle" class="me-3">
                    <a href="login_cliente.html" class="btn btn-primary btn-sm rounded-pill px-3 shadow">
                        <i class="bi bi-person"></i> Iniciar Sesión / Registrarse
                    </a>
                </div>
                <!-- Atrás -->
                <a href="index.html" class="btn btn-outline-light border-0 btn-sm text-white-50 hover-white">
                    <i class="bi bi-arrow-left"></i> Volver al Catálogo
                </a>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <!-- ZONA 1: INFO DEL DISPOSITIVO -->
        <div class="row align-items-center mb-5" id="zona-detalle">
            <div class="col-12 text-center my-5">
                <div class="spinner-border text-dark" role="status"></div>
                <p>Cargando información del dispositivo...</p>
            </div>
        </div>

        <!-- ZONA 2: COMENTARIOS -->
        <div class="row mt-5">
            <div class="col-md-8 offset-md-2 border-top border-secondary pt-5">
                <h4 class="fw-bold mb-4 text-white"><i class="bi bi-chat-text text-primary"></i> Opiniones de Usuarios
                </h4>

                <!-- Contenedor del Formulario (Controlado por Sesión) -->
                <div id="caja-hacer-comentario">
                    <div
                        class="card card-dark bg-transparent border-secondary border-opacity-50 mb-4 rounded-4 shadow-sm text-center py-4">
                        <div class="card-body">
                            <i class="bi bi-lock-fill display-6 text-secondary mb-3"></i>
                            <h5 class="text-white">Inicia sesión para compartir tu opinión</h5>
                            <p class="text-white-50 small mb-4">Solo los usuarios registrados de la comunidad Apple
                                pueden calificar este producto.</p>
                            <a href="login_cliente.html" class="btn btn-primary rounded-pill px-4 shadow">Ingresar
                                ahora</a>
                        </div>
                    </div>
                </div>

                <!-- Lista de Comentarios (Cargada desde la BD) -->
                <div id="lista-comentarios">
                    <p class="text-muted small">Cargando comentarios...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Lógica JavaScript en archivo externo -->
    <script src="cart.js"></script>
    <script src="scripts.js"></script>
    <!-- Botón WhatsApp Flotante -->
    <a href="https://wa.me/573178394478?text=Hola%20Degnis%2C%20necesito%20cotizar%20un%20proyecto%20de%20dise%C3%B1o%20y%20desarrollo%20web.%20%C2%BFPodemos%20hablar%3F"
        class="whatsapp-float" target="_blank">
        <i class="bi bi-whatsapp"></i>
    </a>
</body>

</html>
