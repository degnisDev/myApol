<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyApol - Ingreso de Administrador</title>
    <!-- Estilos Web de Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Nuestro estilo general -->
    <link rel="stylesheet" href="styles.css">

    <style>
        /* Estilos EXCLUSIVOS para centrar perfectamente el login (Glassmorphism) */
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Recicla nuestro fondo negro-azulado */
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1f24 100%);
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            background: rgba(40, 44, 52, 0.4);
            /* Transparente para efecto cristal */
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            /* Efecto desfoque de Apple */
            border-radius: 20px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
            width: 100%;
        }

        /* Efecto halo de luz elegante detrás de la ventana */
        .glow-effect {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(13, 110, 253, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>

<body>

    <!-- Halo de luz decorativo de fondo -->
    <div class="glow-effect"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5 col-xl-4 z-1">

                <div class="card login-card p-4 p-md-5">
                    <div class="text-center mb-5">
                        <h1 class="text-white fw-bold mb-1">
                            <span class="logo-myapol" style="font-size: 3.5rem;">
                                <i class="bi bi-apple text-gradient"></i>
                                <span class="logo-letter">M</span>
                            </span> MyApol
                        </h1>
                        <p class="text-secondary tracking-wide text-uppercase small">Panel Administrativo</p>
                    </div>
                    <!-- El Formulario de Acceso -->
                    <form id="form-login">

                        <div class="mb-4">
                            <label class="form-label text-white-50 small ms-1 mb-1">Correo Electrónico</label>
                            <div class="input-group input-group-lg">
                                <span class="input-group-text bg-dark border-secondary text-secondary"><i
                                        class="bi bi-person"></i></span>
                                <input type="email" id="correo"
                                    class="form-control form-control-dark border-secondary text-white"
                                    placeholder="admin@myapol.com" required>
                            </div>
                        </div>

                        <div class="mb-5">
                            <label class="form-label text-white-50 small ms-1 mb-1">Contraseña</label>
                            <div class="input-group input-group-lg">
                                <span class="input-group-text bg-dark border-secondary text-secondary"><i
                                        class="bi bi-lock"></i></span>
                                <input type="password" id="password"
                                    class="form-control form-control-dark border-secondary text-white"
                                    placeholder="••••••••" required>
                            </div>
                        </div>

                        <!-- Botón Acento (Reutilizado del CSS global) -->
                        <button type="submit" class="btn btn-accent w-100 mb-4 py-3 fw-bold shadow-lg" id="btn-submit">
                            Autenticarse <i class="bi bi-box-arrow-in-right ms-2"></i>
                        </button>

                        <!-- Mensajes de Error JS -->
                        <div class="text-center fs-6 fw-bold mb-4" id="mensaje-error" style="height: 24px;"></div>

                        <!-- Regresar al Público -->
                        <div class="text-center border-top border-secondary pt-3 mt-2">
                            <a href="index.html"
                                class="text-secondary text-decoration-none small hover-white transition"><i
                                    class="bi bi-arrow-left me-1"></i> Volver a la Tienda Pública</a>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <!-- Script de Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- LÓGICA DE LOGIN -->
    <script>
        document.getElementById('form-login').addEventListener('submit', function (e) {
            e.preventDefault(); // Evitamos que la página se reinicie sola

            const txtCorreo = document.getElementById('correo').value;
            const txtPassword = document.getElementById('password').value;
            const msgError = document.getElementById('mensaje-error');
            const btnSubmit = document.getElementById('btn-submit');

            // Ponemos el botón a cargar
            btnSubmit.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Validando...';
            btnSubmit.disabled = true;
            msgError.innerHTML = ''; // Limpiamos errores pasados

            // Nos comunicamos con el backend (Ruta /api/login)
            fetch('http://localhost:5000/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({ correo: txtCorreo, password: txtPassword })
            })
                .then(respuesta => respuesta.json())
                .then(datos => {
                    btnSubmit.innerHTML = 'Autenticarse <i class="bi bi-box-arrow-in-right ms-2"></i>';
                    btnSubmit.disabled = false;

                    if (datos.success) {
                        msgError.innerHTML = '<span class="text-success"><i class="bi bi-check-circle-fill"></i> Acceso Concedido</span>';

                        // Guardamos el Session Token falso en el navegador
                        localStorage.setItem('admin_token', datos.token);
                        localStorage.setItem('admin_id', datos.id_usuario);

                        // Viajamos automáticamente al admin.html tras 1 segundo
                        setTimeout(() => {
                            window.location.href = 'admin.html';
                        }, 1000);
                    } else {
                        msgError.innerHTML = '<span class="text-danger"><i class="bi bi-exclamation-triangle-fill"></i> ' + datos.mensaje + '</span>';
                    }
                })
                .catch(error => {
                    console.error("Fallo de conexión en Login:", error);
                    btnSubmit.innerHTML = 'Autenticarse <i class="bi bi-box-arrow-in-right ms-2"></i>';
                    btnSubmit.disabled = false;
                    msgError.innerHTML = '<span class="text-danger"><i class="bi bi-wifi-off"></i> No hay conexión con el servidor interno.</span>';
                });
        });
    </script>
</body>

</html>
